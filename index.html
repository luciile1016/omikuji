<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浅草寺 御神籤</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Noto+Serif+JP:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f7f3ec;
    --ink: #1a1714;
    --ink-light: #6b6660;
    --ink-faint: #b0aa9f;
    --border: #d6cfc4;
    --red: #8B1A1A;
  }

  html, body {
    min-height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Serif SC', 'Noto Serif JP', serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  /* ── HOME ── */
  #home {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    opacity: 1;
    transition: opacity 0.4s ease;
  }

  #home.hiding { opacity: 0; pointer-events: none; }

  .site-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }

  .site-title {
    font-size: 15px;
    letter-spacing: 0.14em;
    color: var(--ink-light);
    margin-bottom: 56px;
  }

  .draw-btn {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    letter-spacing: 0.16em;
    color: var(--ink-light);
    background: transparent;
    border: 0.5px solid var(--border);
    padding: 13px 40px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    border-radius: 1px;
  }

  .draw-btn:hover {
    border-color: var(--ink-light);
    color: var(--ink);
  }

  /* ── RESULT ── */
  #result {
    display: none;
    width: 100%;
    max-width: 440px;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(.22,1,.36,1);
  }

  #result.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .lot-img {
    display: block;
    width: 180px;
    margin: 0 auto 1.5rem;
    border: 0.5px solid var(--border);
  }

  .lot-num {
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--ink-faint);
    text-align: center;
    margin-bottom: 4px;
  }

  .lot-rank {
    font-size: 30px;
    font-weight: 500;
    text-align: center;
    letter-spacing: 0.08em;
    margin-bottom: 28px;
  }

  .divider {
    width: 100%;
    height: 0.5px;
    background: var(--border);
    margin-bottom: 24px;
  }

  .lot-verse {
    font-size: 13px;
    line-height: 2.4;
    color: var(--ink-light);
    text-align: center;
    white-space: pre-line;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }

  .lot-reading {
    font-size: 13px;
    line-height: 2.1;
    color: var(--ink);
    margin-bottom: 28px;
  }

  .items-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 32px;
  }

  .item-card {
    border: 0.5px solid var(--border);
    padding: 12px 14px;
  }

  .item-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    margin-bottom: 6px;
  }

  .item-text {
    font-size: 12px;
    line-height: 1.9;
    color: var(--ink-light);
  }

  .again-btn {
    display: block;
    margin: 0 auto;
    font-family: 'Noto Serif SC', serif;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    background: transparent;
    border: 0.5px solid var(--border);
    padding: 9px 28px;
    cursor: pointer;
    border-radius: 1px;
    transition: border-color 0.2s, color 0.2s;
  }

  .again-btn:hover {
    border-color: var(--ink-light);
    color: var(--ink-light);
  }
</style>
</head>
<body>

<div id="home">
  <p class="site-label">浅草寺</p>
  <p class="site-title">御神籤</p>
  <button class="draw-btn" onclick="drawLot()">点击求签</button>
</div>

<div id="result">
  <img class="lot-img" id="lot-img" src="" alt="">
  <p class="lot-num" id="lot-num"></p>
  <p class="lot-rank" id="lot-rank"></p>
  <div class="divider"></div>
  <p class="lot-verse" id="lot-verse"></p>
  <p class="section-label">籤解</p>
  <p class="lot-reading" id="lot-reading"></p>
  <div class="items-grid" id="lot-items"></div>
  <button class="again-btn" onclick="resetLot()">再求一籤</button>
</div>

<script>
const RANK_COLORS = {"大吉":"#8B1A1A","吉":"#1A5C1A","半吉":"#1A3A8B","小吉":"#7A5C00","末吉":"#4a4a4a","末小吉":"#5C5C5C","凶":"#6B1A1A"};
const LOTS = [{"num": "\u7b2c\u4e00\u756a", "rank": "\u5927\u5409", "rankColor": "#8B1A1A", "verse": "\u4e03\u5bf6\u6d6e\u5716\u5854\uff0c\u9ad8\u5cf0\u9802\u4e0a\u5b89\u3002\n\u773e\u4eba\u7686\u4ef0\u671b\uff0c\u83ab\u4f5c\u7b49\u9592\u770b\u3002", "reading": "\u6b64\u7c64\u70ba\u5927\u5409\u4e4b\u5146\u3002\u5982\u540c\u4ee5\u4e03\u5bf6\u88dd\u98fe\u7684\u7cbe\u7f8e\u4f5b\u5854\u5dcd\u7136\u5c79\u7acb\u65bc\u9ad8\u5cf0\u4e4b\u5dd4\uff0c\u60a8\u5c07\u8655\u65bc\u4e00\u500b\u80fd\u6d1e\u5bdf\u842c\u4e8b\u3001\u5099\u53d7\u5468\u570d\u773e\u4eba\u4fe1\u8cf4\u8207\u4ef0\u671b\u7684\u9ad8\u4f4d\u3002\u53ea\u8981\u4fdd\u6301\u6b63\u9053\u3001\u4e0d\u96a8\u4fbf\u6577\u884d\u4e86\u4e8b\uff0c\u4ee5\u6b63\u78ba\u7684\u5fc3\u601d\u53bb\u9762\u5c0d\u842c\u7269\uff0c\u60a8\u7684\u7d50\u679c\u5c07\u6703\u6108\u767c\u826f\u597d\u3002\u6a5f\u7de3\u6975\u4f73\uff0c\u5207\u83ab\u7b49\u9592\u8996\u4e4b\u3002", "phrases": [["\u4e03\u5bf6\u6d6e\u5716\u5854", "\u5c31\u50cf\u51fa\u73fe\u4e86\u7528\u7f8e\u9e97\u5bf6\u77f3\u505a\u6210\u7684\u4f5b\u5854\u822c\u5730\uff0c\u4f3c\u4e4e\u6703\u6709\u975e\u5e38\u597d\u7684\u4e8b\u60c5\u3002"], ["\u9ad8\u5cf0\u9802\u4e0a\u5b89", "\u56e0\u70ba\u80fd\u6539\u7528\u653e\u773c\u842c\u4e8b\u7684\u7acb\u5834\uff0c\u53ef\u4ee5\u5f97\u5230\u5468\u570d\u7684\u4eba\u5011\u7684\u4fe1\u8cf4\u5427\u3002"], ["\u773e\u4eba\u7686\u4ef0\u671b", "\u5408\u4e4e\u6b63\u9053\u7684\u4f60\u7684\u884c\u70ba\uff0c\u80fd\u88ab\u5f88\u591a\u4eba\u7684\u8a8d\u540c\u53ca\u9f13\u52f5\u3002"], ["\u83ab\u4f5c\u7b49\u9592\u770b", "\u4e0d\u7528\u96a8\u4fbf\u7684\u614b\u5ea6\u770b\u4e8b\u60c5\uff0c\u7528\u6b63\u78ba\u7684\u5fc3\u601d\u6703\u62db\u4f86\u66f4\u591a\u7684\u597d\u7684\u7d50\u679c\u3002"]], "items": [["\u9858\u671b", "\u6703\u5145\u5206\u5730\u5be6\u73fe\u5427\u3002"], ["\u75be\u75c5", "\u6703\u6cbb\u7652\u5427\u3002"], ["\u5f85\u4eba", "\u6703\u51fa\u73fe\u5427\u3002"], ["\u907a\u5931\u7269", "\u8b8a\u5f97\u9072\u9072\u5730\u624d\u627e\u5230\u5427\u3002"], ["\u8af8\u4e8b", "\u84cb\u65b0\u5c45\u3001\u642c\u5bb6\u3001\u5ac1\u5a36\u3001\u65c5\u884c\u3001\u4ea4\u5f80\u7b49\u5168\u90e8\u5f88\u597d\u5427\u3002"], ["\u63d0\u9192", "\u842c\u4e8b\u884c\u70ba\u8b39\u614e\u3002\u7c97\u5fc3\u5927\u610f\u884c\u4e8b\u7684\u8a71\uff0c\u5c31\u6703\u767c\u751f\u610f\u60f3\u4e4b\u5916\u7684\u707d\u5bb3\u5427\u3002"]]}, {"num": "\u7b2c\u4e8c\u756a", "rank": "\u5c0f\u5409", "rankColor": "#7A5C00", "verse": "\u6708\u88ab\u6d6e\u96f2\u7ff3\uff0c\u7acb\u4e8b\u81ea\u660f\u8ff7\u3002\n\u5e78\u4e5e\u9670\u516c\u7950\uff0c\u4f55\u616e\u4e0d\u958b\u7709\u3002", "reading": "\u6b64\u7c64\u70ba\u5c0f\u5409\u4e4b\u5146\u3002\u76ee\u524d\u60a8\u7684\u72c0\u614b\u5c31\u50cf\u660e\u6708\u66ab\u6642\u88ab\u6d6e\u96f2\u906e\u64cb\uff0c\u5fc3\u4e2d\u96d6\u6709\u5f37\u70c8\u7684\u9858\u671b\uff0c\u4f46\u73fe\u72c0\u9084\u4e0d\u5230\u80fd\u5be6\u73fe\u7684\u5730\u6b65\uff0c\u5bb9\u6613\u9677\u5165\u7336\u8c6b\u4e0d\u6c7a\u3001\u6c7a\u5fc3\u4e0d\u5b9a\u7684\u8ff7\u832b\u3002\u4e0d\u904e\uff0c\u53ea\u8981\u60a8\u5168\u5fc3\u5168\u610f\u70ba\u4ed6\u4eba\u76e1\u529b\uff08\u7a4d\u9670\u5fb7\uff09\uff0c\u7372\u5f97\u51a5\u51a5\u4e4b\u4e2d\u7684\u5e87\u4f51\uff0c\u672a\u4f86\u5fc5\u5b9a\u6703\u8fce\u4f86\u4ee4\u4eba\u6b23\u559c\u7684\u597d\u4e8b\uff0c\u5230\u90a3\u6642\u4fbf\u53ef\u5c55\u958b\u7dca\u8e59\u7684\u7709\u982d\uff0c\u4e0d\u5fc5\u518d\u64d4\u5fc3\u672a\u4f86\u4e86\u3002", "phrases": [["\u6708\u88ab\u6d6e\u96f2\u7ff3", "\u5f37\u70c8\u7684\u9858\u671b\u96d6\u7136\u62b1\u6301\u8457\uff0c\u4f46\u5728\u73fe\u5728\u7684\u72c0\u614b\u4e0b\u8981\u5230\u5be6\u73fe\u4f3c\u4e4e\u9084\u6c92\u5230\u90a3\u7a2e\u5730\u6b65\u3002"], ["\u7acb\u4e8b\u81ea\u660f\u8ff7", "\u7e3d\u662f\u5728\u8003\u616e\u8981\u600e\u9ebc\u8fa6\u624d\u597d\uff0c\u6c92\u6709\u6c7a\u5fc3\u7684\u72c0\u6cc1\u6703\u6301\u7e8c\u3002"], ["\u5e78\u4e5e\u9670\u516c\u7950", "\u70ba\u4e86\u5225\u4eba\u7684\u5229\u76ca\u5168\u5fc3\u5168\u610f\u5730\u76e1\u529b\uff0c\u4ee5\u6b64\u80fd\u5f97\u5230\u5e78\u798f\u3002" 301\u8ddd\u96e2\u3002"], ["\u63d0\u9192", "\u6b64\u4e43\u300c\u834a\u68d8\u91cd\u91cd\u3001\u4ee5\u8aa0\u5316\u96aa\u300d\u4e4b\u7c64\u3002\u6b64\u6642\u5207\u5fcc\u525b\u610e\u81ea\u7528\u6216\u813e\u6c23\u66b4\u8e81\uff0c\u591a\u807d\u9577\u8f29\u52f8\u544a\u4e26\u8aa0\u5fc3\u5411\u5584\uff0c\u65b9\u80fd\u5728\u5927\u98a8\u5927\u6d6a\u4e2d\u4fdd\u5168\u5713\u6eff\u3002"]]}, {"num": "\u7b2c\u4e8c\u5341\u756a", "rank": "\u5409", "rankColor": "#1A5C1A", "verse": "\u6708\u51fa\u6f38\u5206\u660e\uff0c\u5bb6\u8ca1\u6bcf\u6bcf\u8208\u3002\n\u4f55\u8a00\u5148\u6709\u6eef\uff0c\u66f4\u8b8a\u7acb\u529f\u540d\u3002", "reading": "\u6b64\u7c64\u70ba\u5409\u5146\u3002\u8c61\u5fb5\u8457\u60a8\u5373\u5c07\u64fa\u812b\u5f80\u65e5\u7684\u9670\u973e\uff0c\u8fce\u4f86\u6b65\u6b65\u9ad8\u5347\u7684\u597d\u904b\u3002\u5c31\u5982\u540c\u660e\u6708\u7834\u958b\u70cf\u96f2\u3001\u7de9\u7de9\u5347\u5165\u9ad8\u7a7a\u4e00\u822c\uff0c\u539f\u672c\u6a21\u7cca\u4e0d\u6e05\u7684\u524d\u9014\u5c07\u6703\u8b8a\u5f97\u8d8a\u4f86\u8d8a\u6e05\u6670\u3001\u660e\u6717\u3002\u96a8\u8457\u904b\u52e2\u7684\u5168\u9762\u5fa9\u7526\uff0c\u60a8\u7684\u8cc7\u7522\u3001\u8ca1\u5bcc\u4ee5\u53ca\u5bb6\u696d\u90fd\u5c07\u65e5\u76ca\u8208\u65fa\u3001\u5448\u73fe\u51fa\u7e41\u69ae\u660c\u76db\u7684\u666f\u8c61\u3002\u904e\u53bb\u90a3\u4e9b\u8b93\u60a8\u611f\u5230\u505c\u6eef\u4e0d\u524d\u3001\u8655\u8655\u53d7\u963b\u7684\u5927\u5927\u5c0f\u5c0f\u7169\u60f1\uff0c\u5982\u4eca\u90fd\u4e0d\u5fc5\u518d\u653e\u5728\u5fc3\u4e0a\u4e86\uff0c\u56e0\u70ba\u4e00\u5207\u90fd\u5c07\u671d\u8457\u975e\u5e38\u597d\u7684\u65b9\u5411\u8fc5\u901f\u63a8\u9032\u3002\u53ea\u8981\u60a8\u80fd\u56e0\u6642\u5236\u5b9c\u3001\u9806\u61c9\u6642\u52e2\u505a\u51fa\u7a4d\u6975\u7684\u6539\u8b8a\u8207\u52aa\u529b\uff0c\u5fc5\u5b9a\u80fd\u6293\u4f4f\u6a5f\u9047\u3001\u4e00\u8209\u5efa\u7acb\u8d77\u4ee4\u4eba\u7fa8\u6155\u7684\u529f\u540d\u8207\u6210\u5c31\uff0c\u540d\u5229\u96d9\u6536\u3002", "phrases": [["\u6708\u51fa\u6f38\u5206\u660e", "\u6b63\ , "\u6b64\u7c64\u4e43\u662f\u300c\u5929\u4eba\u5408\u4e00\u3001\u5584\u56e0\u5409\u679c\u300d\u4e4b\u8c61\u3002\u60a8\u524d\u65b9\u7684\u7e41\u69ae\u662f\u300c\u6c34\u5230\u6e20\u6210\u300d\u7684\u5fc5\u7136\u7d50\u679c\uff0c\u5207\u5fcc\u6025\u8e81\u6216\u52d5\u7528\u4e0d\u6b63\u7576\u7684\u5fc3\u6a5f\u3002\u8acb\u653e\u5bec\u5fc3\uff0c\u5378\u4e0b\u5fc3\u4e2d\u4e0d\u5fc5\u8981\u7684\u91cd\u64d4\uff0c\u7e7c\u7e8c\u4fdd\u6301\u60a8\u7684\u5584\u826f\u3001\u6b63\u76f4\u8207\u8aa0\u5be6\u3002\u53ea\u8981\u6cbf\u8457\u6b63\u78ba\u7684\u9053\u8def\u8d70\u4e0b\u53bb\uff0c\u4e0a\u5929\u81ea\u7136\u6703\u628a\u6700\u597d\u7684\u798f\u5831\u96d9\u624b\u5949\u737b\u7d66\u60a8\u3002"]]}, {"num": "\u7b2c\u4e03\u5341\u4e03\u756a", "rank": "\u51f6", "rankColor": "#A61C1C", "verse": "\u7d2f\u6eef\u672a\u80fd\u7a4c\uff0c\u6c42\u540d\u83ab\u9060\u5716\u3002\n\u767b\u821f\u6ce2\u6d6a\u6025\uff0c\u54ab\u5c3a\u9694\u5929\u8862\u3002", "reading": "\u6b64\u7c64\u70ba\u51f6\u5146\u3002\u9019\u9810\u793a\u8457\u60a8\u76ee\u524d\u6b63\u9762\u81e8\u8457\u300c\u8af8\u4e8b\u505c\u6eef\u3001\u54ab\u5c3a\u5929\u6daf\u300d\u7684\u6975\u5ea6\u618b\u5c48\u8207\u56f0\u9813\u671f\u3002\u5728\u60a8\u7684\u751f\u6d3b\u4e2d\uff0c\u7121\u6578\u7684\u9ebb\u7169\u3001\u963b\u7919\u8207\u4e0d\u5982\u610f\u7684\u4e8b\u60c5\u63a5\u4e8c\u9023\u4e09\u5730\u91cd\u758a\u3001\u7a4d\u58d3\u5728\u4e00\u8d77\uff0c\u5c0e\u81f4\u5c40\u52e2\u5b8c\u5168\u770b\u4e0d\u5230\u4efb\u4f55\u9032\u5c55\u8207\u597d\u8f49\u7684\u5e0c\u671b\uff0c\u8b93\u60a8\u6574\u500b\u4eba\u9677\u5165\u4e86\u7121\u6cd5\u7526\u9192\u3001\u52d5\u5f48\u4e0d\u5f97\u7684\u75b2\u618a\u72c0\u614b\uff08\u7d2f\u6eef\u672a\u80fd\u7a4c\uff09\u3002\u5728\u9019\u7a2e\u6975\u5176\u4f4e\u8ff7\u7684\u904b\u52e2\u4e0b\uff0c\u73fe\u5728\u7d55\u5c0d\u4e0d\u662f\u53bb\u8ffd\u6c42\u540d\u5229\u3001\u64f4\u5f35\u4e8b\u696d\u6216\u662f\u5be6\u65bd\u5b8f\u5927\u8a08\u756b\u7684\u6642\u5019\uff0c\u5343\u842c\u4e0d\u8981\u5c0d\u90a3\u4e9b\u8d85\u51fa\u81ea\u5df1\u638c\u c71\u3002\n\u4e0d\u9047\u795e\u4ed9\u9762\uff0c\u7a7a\u60f9\u610f\u73ca\u745a\u3002", "reading": "\u6b64\u7c64\u70ba\u51f6\u5146\u3002\u9019\u9810\u793a\u8457\u60a8\u76ee\u524d\u6b63\u9762\u81e8\u8457\u4e00\u500b\u300c\u5e0c\u671b\u843d\u7a7a\u3001\u6d17\u5fc3\u9769\u9762\u300d\u7684\u7d42\u6975\u8003\u9a57\u671f\u3002\u9019\u662f\u6dfa\u8349\u5bfa\u89c0\u97f3\u767e\u7c64\u7684\u6700\u5f8c\u4e00\u9996\uff0c\u4e5f\u662f\u4e00\u9996\u8c61\u5fb5\u8457\u300c\u7e41\u83ef\u843d\u76e1\u3001\u56de\u6b78\u672c\u5fc3\u300d\u7684\u7279\u6b8a\u7c64\u8a69\u3002\u60a8\u76ee\u524d\u5728\u73fe\u5be6\u4e2d\u6240\u8ffd\u6c42\u7684\u90a3\u4e9b\u540d\u5229\u3001\u8ca1\u5bcc\u8207\u5730\u4f4d\uff08\u797f\u4f4d\uff09\uff0c\u5982\u4eca\u5c31\u50cf\u662f\u98c4\u5411\u4e86\u9ad8\u9ad8\u5728\u4e0a\u7684\u767d\u96f2\u6df1\u8655\u4e00\u6a23\uff0c\u5fb9\u5e95\u812b\u96e2\u4e86\u60a8\u7684\u638c\u63a7\uff0c\u8b93\u60a8\u5931\u53bb\u4e86\u6240\u6709\u7684\u4f9d\u6043\u8207\u4f9d\u9760\uff0c\u9677\u5165\u4e86\u7121\u4f9d\u7121\u9760\u7684\u88ab\u52d5\u5883\u5730\uff08\u797f\u8d70\u767d\u96f2\u9593\uff09\u3002\u5728\u9019\u7a2e\u770b\u900f\u4e16\u4fd7\u7684\u7a98\u5883\u4e0b\uff0c\u60a8\u5c31\u50cf\u662f\u4e00\u500b\u62b1\u8457\u53e4\u7434\u3001\u7368\u81ea\u4e00\u4eba\u7ffb\u5c71\u8d8a\u5dba\u3001\u8a66\u5716\u9060\u96e2\u51e1\u5875\u4fd7\u4e16\u7684\u96b1\u58eb\u4e00\u6a23\uff0c\u9019\u5f37\u70c8\u6697\u793a\u8457\u60a8\u5fc3\u4e2d\u6b63\u7522\u751f\u4e86\u60f3\u8981\u9003\u907f\u73fe\u5be6\u3001\u751a\u81f3\u5fb9\u5e95\u96b1\u9000\u3001\u653e\u68c4\u7576\u524d\u4e8b\u696d\u7684\u6d88\u6975\u5ff5\u982d\uff08\u651c\u7434\u904e\u9060\u5c71\uff09\u3002\u7136\u800c\u7121\u5948\u7684\u662f\uff0c\u5373\u4fbf\u60a8\u8d70\u9032\u4e86\u6df1\u5c71\uff0c\u5728\u524d\u884c\u7684\u9053\u8def\u4e0a\uff0c\u60a8\u4e5f\u6839\u672c\u9047\u4e0d\u5230\u80fd\u5920\u7d66\u60a8\u6307\u5f15\u8ff7\u6d25\u3001\u50b3\u6388\u5929\u9053\u7684\u300c\u795e\u4ed9\u300d\uff0c\u5167\u5fc3\u986f\u5f97\u7121\u6bd4\u5b64\u7368\u8207\u5fc3\u7d30\uff08\u4e0d\u9047\u795e\u4ed9\u9762\uff09\u3002\u60a8\u6240\u6709\u7684\u6399\u624e\u3001\u80e1\u601d\u4e82\u60f3\u4ee5\u53ca\u90a3\u4e9b\u904e\u5ea6\u9f90\u5927\u7684\u91ce\u5fc3\uff0c\u6700\u7d42\u90fd\u53ea\u6703\u5316\u4f5c\u4e00\u5834\u7a7a\uff0c\u8b93\u60a8\u6574\u500b\u4eba\u5fc3\u7a7a\u610f\u6eff\u3001\u307c\u3046\u7136\u843d\u9b44\u5730\u4f47\u7acb\u5728\u539f\u5730\uff0c\u9014\u65b9\u5bf8\u5927\u4e82\uff08\u7a7a\u60f9\u610f\u73ca\u745a\uff09\u3002\u6b64\u6642\uff0c\u9019\u9996\u7c64\u8a69\u5176\u5be6\u662f\u5728\u7d66\u60a8\u4e00\u5291\u7576\u982d\u68d2\u559d\uff1a\u8acb\u52d9\u5fc5\u5fb9\u5e95\u6539\u904e\u81ea\u65b0\uff0c\u5c07\u5fc3\u4e2d\u6240\u6709\u4e0d\u5207\u5be6\u969b\u7684\u91ce\u5fc3\u8207\u617e\u671b\u5fb9\u5e95\u6452\u68c4\uff0c\u5b89\u5206\u5b88\u5df1\u5730\u5728\u4e16\u9593\u751f\u6d3b\uff0c\u9019\u624d\u662f\u552f\u4e00\u7684\u51fa\u8def\u3002\u89e3\u3002", "phrases": [["\u797f\u8d70\u767d\u96f2\u9593", "\u540d\u5229\u8207\u4f9d\u6043\u5982\u767d\u96f2\u822c\u98c4\u6563\uff0c\u4ee3\u8868\u73fe\u5be6\u4e2d\u7684\u8ca1\u5bcc\u8207\u6b0a\u4f4d\u6b63\u8207\u60a8\u6f38\u884c\u6f38\u9060\uff0c\u5931\u53bb\u4e86\u6700\u91cd\u8981\u7684\u4f9d\u9760\u3002"], ["\u651c\u7434\u904e\u9060\u5c71", "\u5fc3\u4e2d\u7522\u751f\u4e86\u5f37\u70c8\u7684\u9003\u907f\u8207\u96b1\u9000\u5fc3\u7406\uff0c\u60f3\u8981\u9060\u96e2\u51e1\u5875\u7684\u55a7\u56c2\u8207\u662f\u975e\uff0c\u7368\u81ea\u4e00\u4eba\u9762\u5c0d\u5b64\u7368\u3002"], ["\u4e0d\u9047\u795e\u4ed9\u9762", "\u5728\u8ff7\u832b\u4e2d\u56db\u8655\u6c42\u52a9\u537b\u6c42\u52a9\u7121\u9580\uff0c\u9047\u4e0d\u5230\u80fd\u5920\u6307\u9ede\u8ff7\u6d25\u7684\u8cb4\u4eba\u6216\u795e\u4f5b\uff0c\u5167\u5fc3\u7121\u6bd4\u5fc3\u7d30\u3002"], ["\u7a7a\u60f9\u610f\u73ca\u745a", "\u904e\u5ea6\u7684\u91ce\u5fc3\u8207\u96dc\u5ff5\u6700\u7d42\u5168\u90e8\u5316\u4f5c\u4e00\u5834\u7a7a\uff0c\u8b93\u4eba\u5167\u5fc3\u7a7a\u865b\u3001\u307c\u3046\u7136\u82e5\u5931\uff0c\u544a\u8aa1\u4eba\u5011\u5fc5\u9808\u6452\u68c4\u91ce\u5fc3\u3002"]], "items": [["\u9858\u671b", "\u6b63\u9022\u904b\u52e2\u7684\u5927\u7d42\u7d50\u8207\u4f4e\u8c37\u671f\uff0c\u60a8\u7684\u5404\u9805\u91ce\u5fc3\u8207\u8acb\u6c42\u662f\u975e\u5e38\u96e3\u4ee5\u5be6\u73fe\u7684\u3002"], ["\u75be\u75c5", "\u75c5\u6cc1\u986f\u5f97\u6975\u5176\u51f6\u96aa\u3001\u6c89\u91cd\u4e14\u4e0d\u5bb9\u6a02\u89c0\uff0c\u5c6c\u65bc\u9700\u8981\u683c\u5916\u8b66\u60d5\u3001\u751a\u81f3\u6709\u751f\u547d\u5371\u96aa\u7684\u60e1\u52a3\u671f\uff0c\u9700\u5168\u529b\u91ab\u6cbb\u3002"], ["\u907a\u5931\u7269", "\u4e1f\u5931\u7684\u7269\u54c1\u5df2\u7d93\u5fb9\u5e95\u8ff7\u5931\u5728\u9060\u5c71\u6df1\u8655\uff0c\u5c6c\u65bc\u5f88\u96e3\u518d\u51fa\u73fe\u5728\u773c\u524d\u7684\u7d55\u5c0d\u627e\u4e0d\u56de\u72c0\u614b\u3002"], ["\u5f85\u4eba", "\u60a8\u6b63\u5728\u82e6\u82e6\u671f\u76fc\u3001\u7b49\u5f85\u7684\u90a3\u500b\u4eba\u9019\u6b21\u7d55\u5c0d\u4e0d\u6703\u73fe\u8eab\u4e86\uff0c\u4e0d\u7528\u518d\u767d\u767d\u6d6a\u8cbb\u6642\u9593\u3002"], ["\u8af8\u4e8b", "\u65b0\u7bc9\u3001\u5f15\u8d8a\uff08\u642c\u5bb6\u3001\u4fee\u623f\uff09\uff1a\u975e\u5e38\u4e0d\u5409\u5229\uff0c\u76ee\u524d\u7684\u6c23\u5834\u5df2\u7d93\u5fb9\u5e95\u7834\u6557\uff0c\u8acb\u52d9\u5fc5\u4e2d\u6b62\u8a08\u756b\u3002\u65c5\u884c\uff1a\u8def\u9014\u4e2d\u591a\u707d\u591a\u96e3\uff0c\u5168\u662f\u4e0d\u597d\u7684\u5146\u982d\uff0c\u8acb\u53d6\u6d88\u884c\u7a0b\u3002\u7d50\u5a5a\u3001\u4ea4\u5f80\u3001\u793e\u4ea4\u3001\u65b0\u5de5\u4f5c\uff1a\u5168\u65b9\u4f4d\u5927\u51f6\uff0c\u6240\u6709\u65b0\u7684\u611f\u60c5\u8207\u5951\u7d04\u90fd\u61c9\u7acb\u5373\u505c\u6b62\u3002"], ["\u63d0\u9192", "\u6b64\u7c64\u4e43\u662f\u300c\u7e41\u83ef\u843d\u76e1\u3001\u6452\u68c4\u91ce\u5fc3\u300d\u4e4b\u51f6\u8c61\u3002\u4f5c\u70ba\u7b2c\u4e00\u767e\u9996\u7c64\u8a69\uff0c\u5b83\u4e0d\u662f\u70ba\u4e86\u5c07\u60a8\u63a8\u5411\u7d55\u671b\uff0c\u800c\u662f\u547d\u904b\u5728\u8981\u6c42\u60a8\u9032\u884c\u4e00\u5834\u5fb9\u5e95\u7684\u300c\u5927\u6e05\u7b97\u8207\u6d17\u5fc3\u9769\u9762\u300d\u3002\u7576\u524d\u7684\u540d\u5229\u6563\u53bb\uff08\u797f\u8d70\uff09\u3001\u6c42\u52a9\u7121\u9580\uff08\u4e0d\u9047\u4ed9\uff09\uff0c\u9019\u662f\u5728\u5f37\u8feb\u60a8\u653e\u4e0b\u90a3\u4e9b\u8d85\u51fa\u81ea\u8eab\u638c\u63a7\u7684\u9f90\u5927\u91ce\u5fc3\uff08\u610f\u73ca\u745a\uff09\u3002\u8acb\u52d9\u5fc5\u5728\u5fc3\u7406\u4e0a\u63a5\u53d7\u7576\u524d\u7684\u5931\u6557\uff0c\u6536\u650f\u6563\u4e82\u7684\u5fc3\u795e\uff0c\u6539\u6389\u597d\u9ad8\u9a16\u9060\u7684\u6bdb\u75c5\u3002\u63db\u4e00\u526f\u5fc3\u8178\uff0c\u7528\u6700\u5351\u5fae\u3001\u8e0f\u5be6\u4e14\u77e5\u8db3\u7684\u5fc3\u614b\u56de\u6b78\u5230\u5e73\u51e1\u7684\u65e5\u5e38\u751f\u6d3b\u4e2d\u53bb\u3002\u4e0d\u722d\u3001\u4e0d\u6436\u3001\u4e0d\u5f37\u6c42\uff0c\u5b89\u5206\u5b88\u5df1\u5730\u5b88\u4f4f\u73fe\u72c0\uff0c\u60a8\u624d\u80fd\u5728\u547d\u904b\u7684\u7d42\u9ede\u8fce\u4f86\u771f\u6b63\u7684\u5167\u5fc3\u5e73\u5b89\u3002"]]}];

function weightedRandom(){return LOTS[Math.floor(Math.random()*LOTS.length)];}

function drawLot(){
  const home=document.getElementById('home');
  home.classList.add('hiding');
  setTimeout(()=>{
    home.style.display='none';
    renderResult(weightedRandom());
  },400);
}

function renderResult(lot){
  const color=RANK_COLORS[lot.rank]||'#333';
  const numStr=lot.num.replace('第','').replace('番','');
  document.getElementById('lot-img').src='images/'+numStr+'.jpg';
  document.getElementById('lot-img').alt=lot.num+' '+lot.rank;
  document.getElementById('lot-num').textContent=lot.num;
  document.getElementById('lot-rank').textContent=lot.rank;
  document.getElementById('lot-rank').style.color=color;
  document.getElementById('lot-verse').textContent=lot.verse;
  document.getElementById('lot-reading').textContent=lot.reading;
  const grid=document.getElementById('lot-items');
  let html='';
  if(lot.phrases&&lot.phrases.length){
    html+='<div style="grid-column:1/-1;margin-bottom:4px;"><p class="section-label">籤詩解</p></div>';
    lot.phrases.forEach(([k,v])=>{
      html+=`<div class="item-card"><p class="item-label" style="color:${color}">${k}</p><p class="item-text">${v}</p></div>`;
    });
  }
  if(lot.items&&lot.items.length){
    html+='<div style="grid-column:1/-1;margin-top:8px;margin-bottom:4px;"><p class="section-label">運勢</p></div>';
    lot.items.forEach(([k,v])=>{
      html+=`<div class="item-card"><p class="item-label" style="color:${color}">${k}</p><p class="item-text">${v}</p></div>`;
    });
  }
  grid.innerHTML=html;
  const result=document.getElementById('result');
  result.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>result.classList.add('visible')));
}

function resetLot(){
  const result=document.getElementById('result');
  result.classList.remove('visible');
  setTimeout(()=>{
    result.style.display='none';
    result.innerHTML=`
      <img class="lot-img" id="lot-img" src="" alt="">
      <p class="lot-num" id="lot-num"></p>
      <p class="lot-rank" id="lot-rank"></p>
      <div class="divider"></div>
      <p class="lot-verse" id="lot-verse"></p>
      <p class="section-label">籤解</p>
      <p class="lot-reading" id="lot-reading"></p>
      <div class="items-grid" id="lot-items"></div>
      <button class="again-btn" onclick="resetLot()">再求一籤</button>`;
    const home=document.getElementById('home');
    home.style.display='flex';
    home.classList.remove('hiding');
  },400);
}
</script>
</body>
</html>
