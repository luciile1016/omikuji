<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浅草寺 御神籤</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Noto+Serif+JP:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f7f3ec;
    --ink: #1a1714;
    --ink-light: #6b6660;
    --ink-faint: #b0aa9f;
    --border: #d6cfc4;
    --red: #8B1A1A;
  }

  html, body {
    min-height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Serif SC', 'Noto Serif JP', serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  /* ── HOME ── */
  #home {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    opacity: 1;
    transition: opacity 0.4s ease;
  }

  #home.hiding { opacity: 0; pointer-events: none; }

  .site-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }

  .site-title {
    font-size: 15px;
    letter-spacing: 0.14em;
    color: var(--ink-light);
    margin-bottom: 56px;
  }

  .draw-btn {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    letter-spacing: 0.16em;
    color: var(--ink-light);
    background: transparent;
    border: 0.5px solid var(--border);
    padding: 13px 40px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    border-radius: 1px;
  }

  .draw-btn:hover {
    border-color: var(--ink-light);
    color: var(--ink);
  }

  /* ── RESULT ── */
  #result {
    display: none;
    width: 100%;
    max-width: 440px;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(.22,1,.36,1);
  }

  #result.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .lot-img {
    display: block;
    width: 180px;
    margin: 0 auto 1.5rem;
    border: 0.5px solid var(--border);
  }

  .lot-num {
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--ink-faint);
    text-align: center;
    margin-bottom: 4px;
  }

  .lot-rank {
    font-size: 30px;
    font-weight: 500;
    text-align: center;
    letter-spacing: 0.08em;
    margin-bottom: 28px;
  }

  .divider {
    width: 100%;
    height: 0.5px;
    background: var(--border);
    margin-bottom: 24px;
  }

  .lot-verse {
    font-size: 13px;
    line-height: 2.4;
    color: var(--ink-light);
    text-align: center;
    white-space: pre-line;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }

  .lot-reading {
    font-size: 13px;
    line-height: 2.1;
    color: var(--ink);
    margin-bottom: 28px;
  }

  .items-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 32px;
  }

  .item-card {
    border: 0.5px solid var(--border);
    padding: 12px 14px;
  }

  .item-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    margin-bottom: 6px;
  }

  .item-text {
    font-size: 12px;
    line-height: 1.9;
    color: var(--ink-light);
  }

  .again-btn {
    display: block;
    margin: 0 auto;
    font-family: 'Noto Serif SC', serif;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    background: transparent;
    border: 0.5px solid var(--border);
    padding: 9px 28px;
    cursor: pointer;
    border-radius: 1px;
    transition: border-color 0.2s, color 0.2s;
  }

  .again-btn:hover {
    border-color: var(--ink-light);
    color: var(--ink-light);
  }
</style>
</head>
<body>

<div id="home">
  <p class="site-label">浅草寺</p>
  <p class="site-title">御神籤</p>
  <button class="draw-btn" onclick="drawLot()">点击求签</button>
</div>

<div id="result">
  <img class="lot-img" id="lot-img" src="" alt="">
  <p class="lot-num" id="lot-num"></p>
  <p class="lot-rank" id="lot-rank"></p>
  <div class="divider"></div>
  <p class="lot-verse" id="lot-verse"></p>
  <p class="section-label">籤解</p>
  <p class="lot-reading" id="lot-reading"></p>
  <div class="items-grid" id="lot-items"></div>
  <button class="again-btn" onclick="resetLot()">再求一籤</button>
</div>

<script>
const LOTS = [
  { num:"第一番", rank:"大吉", rankColor:"#8B1A1A", verse:"春風浩蕩萬象新，福星高照照前程。\n所求之事皆如願，諸事亨通百業興。", reading:"此籤上上之兆，天地同慶，神明護佑。凡所謀者，當乘此時積極進取，勿猶豫遲疑。機不可失，時不再來，宜速行之。", items:[["願望","心中所願，指日可待，神佑必成。"],["緣分","良緣將至，有情人終成眷屬。"],["事業","鴻圖大展，升遷得位，諸事順遂。"],["健康","體魄康健，精力旺盛，無憂無患。"]]},
  { num:"第二番", rank:"吉", rankColor:"#1A5C1A", verse:"細流匯江海，積土成高山。\n勤耕勿問收，秋來自有糧。", reading:"此籤平穩之象。凡事宜腳踏實地，不可貪功躁進。守正待時，積累日久，自有水到渠成之日。", items:[["願望","所求可成，然需時日，勿急於一時。"],["緣分","緣分漸深，真誠相待，自得佳偶。"],["事業","穩中求進，埋頭苦幹，終見成效。"],["健康","整體平安，注意飲食起居，勿過勞。"]]},
  { num:"第三番", rank:"中吉", rankColor:"#1A3A8B", verse:"雲掩半輪月，峰迴路又轉。\n莫問明日事，且顧眼前緣。", reading:"此籤中平之象，吉凶參半。當下雖有迷霧遮路，然月在雲後未曾消失。凡事保持平常心，靜觀其變，隨機應對。", items:[["願望","所求或有波折，宜調整期望，徐徐圖之。"],["緣分","感情需耐心灌溉，勿急於求成。"],["事業","有阻礙，宜謹慎行事，多聽建議。"],["健康","注意休息，莫讓小恙拖成大病。"]]},
  { num:"第四番", rank:"小吉", rankColor:"#7A5C00", verse:"微光破曉時，萬物漸甦醒。\n積少能成多，一步一腳印。", reading:"此籤小有吉兆，然不宜志得意滿。大事暫緩，先從小處著力，點滴積累，終有可觀。謙遜自持，踏實為要。", items:[["願望","小事可成，大事宜再等待時機。"],["緣分","主動表達，方能打動對方之心。"],["事業","現階段積累實力，靜待晉升良機。"],["健康","體力稍遜，注意補充元氣，早睡早起。"]]},
  { num:"第五番", rank:"末吉", rankColor:"#4a4a4a", verse:"浮雲終散去，月自清輝滿。\n低頭耕一畝，自有豐收年。", reading:"此籤吉在其後。眼前諸事或不盡如人意，然末者，終也，轉機將至之意。此時宜收斂鋒芒，韜光養晦，守得雲開見月明。", items:[["願望","暫不得志，然困境乃磨礪，靜待轉機。"],["緣分","此時緣分尚淺，勿強求，隨緣為上。"],["事業","宜守成，不宜輕舉妄動，忍耐為要。"],["健康","身心俱疲，需好好調養，勿積勞成疾。"]]},
  { num:"第六番", rank:"吉", rankColor:"#1A5C1A", verse:"雨過天自晴，春來花自開。\n守得寒冬過，暖陽照心懷。", reading:"此籤示人以恆心之重。萬事皆有時節，強求無益，順應天時方為上策。靜待時機，蓄力待發，吉祥自至。", items:[["願望","所願雖緩，然必有成，勿輕言放棄。"],["緣分","感情順遂，宜珍惜眼前人。"],["事業","循序漸進，勿貪快，穩健最佳。"],["健康","氣色漸佳，保持良好作息。"]]},
  { num:"第七番", rank:"大吉", rankColor:"#8B1A1A", verse:"金鳳呈祥瑞，紅日照山河。\n四方皆順意，萬事盡如歌。", reading:"此籤大吉之象，上天眷顧，諸事皆宜。把握當下良機，大膽行事，必有豐收。貴人相助，前程似錦。", items:[["願望","所願必成，且超乎預期，心想事成。"],["緣分","桃花盛開，良緣天定，喜事將至。"],["事業","大展宏圖，貴人提攜，前途無量。"],["健康","身強體健，精神奕奕，諸事順遂。"]]},
  { num:"第八番", rank:"中吉", rankColor:"#1A3A8B", verse:"潮起又潮落，花開終花謝。\n人生如行旅，得失皆自然。", reading:"此籤示人以隨緣之道。萬物有起落，人生有得失，皆自然之道。不執著於結果，享受過程，平常心待之，自得其樂。", items:[["願望","以平常心待之，不強求，緣到自成。"],["緣分","感情淡然中見真情，細水長流。"],["事業","不求大富大貴，安穩最是幸福。"],["健康","身心需要平衡，適度放鬆，釋放壓力。"]]},
  { num:"第九番", rank:"吉", rankColor:"#1A5C1A", verse:"燕子銜春泥，辛勤築巢穴。\n一磚一瓦起，終成溫暖家。", reading:"此籤示勤勞之德。凡事親力親為，腳踏實地，不求捷徑。如燕銜泥，雖微小，積累之功，終成大業。", items:[["願望","努力必有回報，付出終見收穫。"],["緣分","用心經營，感情日漸深厚。"],["事業","勤奮是最好的捷徑，堅持到底。"],["健康","勞逸結合，運動有益，體魄漸強。"]]},
  { num:"第十番", rank:"小吉", rankColor:"#7A5C00", verse:"山路雖崎嶇，終抵山頂峰。\n莫嫌腳步慢，只怕不啟程。", reading:"此籤勉人以行動。空有雄心而不付諸行動，終是枉然。萬里之行始於足下，即便步伐緩慢，只要前行，終能抵達目的地。", items:[["願望","先踏出第一步，行動勝過空想。"],["緣分","主動出擊，等待無法改變現狀。"],["事業","開始行動，即便不完美，也勝過原地踏步。"],["健康","養成運動習慣，從小事做起。"]]},
  { num:"第十一番", rank:"吉", rankColor:"#1A5C1A", verse:"春江水暖鴨先知，好事將至有先機。\n把握機緣莫遲疑，順水行舟自得宜。", reading:"此籤示時機之重。好機緣已悄然而至，需有敏銳之心方能察覺。把握此時，順勢而為，事半功倍。", items:[["願望","機緣已到，把握當下，勿讓機會溜走。"],["緣分","有人暗中關注，不妨敞開心扉。"],["事業","此時出手，正當其時，成功在望。"],["健康","氣運正佳，此時調養事半功倍。"]]},
  { num:"第十二番", rank:"末吉", rankColor:"#4a4a4a", verse:"枯樹逢春雨，殘燈遇清風。\n否極終泰來，黎明在前方。", reading:"此籤示人於逆境中保持希望。眼前雖有困頓，然否極泰來，此乃天道。忍一時之苦，蓄一世之力，黎明終將到來。", items:[["願望","暫時受阻，保持希望，轉機將至。"],["緣分","感情有考驗，共渡難關更見真情。"],["事業","低潮期宜沉澱學習，蓄力待發。"],["健康","注意調養，困境中更要照顧好自己。"]]},
  { num:"第十三番", rank:"大吉", rankColor:"#8B1A1A", verse:"龍騰九天際，鳳舞彩雲間。\n吉星高照臨，百福自然還。", reading:"此籤龍鳳呈祥之兆，吉慶非常。神明特別眷顧，此時做任何決定皆宜，大膽前行，必有貴人相助，好運連連。", items:[["願望","無往不利，所有心願皆能達成。"],["緣分","姻緣天定，佳期將至，喜事連連。"],["事業","飛黃騰達，此時宜積極擴展事業版圖。"],["健康","健康滿分，精力充沛，諸事皆宜。"]]},
  { num:"第十四番", rank:"中吉", rankColor:"#1A3A8B", verse:"半晴半陰天，半喜半憂懷。\n中庸守正道，平穩自然來。", reading:"此籤示中庸之道。不偏不倚，守正不阿，乃處世之本。凡事適可而止，不過分追求，不輕易放棄，自得平和之境。", items:[["願望","平穩可期，不求大起，只願安穩。"],["緣分","感情平淡中見真情，珍惜日常。"],["事業","守住本分，不冒進，穩健發展。"],["健康","身體平穩，保持規律生活即可。"]]},
  { num:"第十五番", rank:"吉", rankColor:"#1A5C1A", verse:"明月照千里，清風送爽來。\n心靜自然涼，萬事不須猜。", reading:"此籤示清靜之德。心若明鏡，照萬物而不染塵埃。保持內心清明，凡事自然迎刃而解，無須過多猜疑憂慮。", items:[["願望","以靜制動，心誠則靈，所願必達。"],["緣分","真誠之心，自然感動對方，緣分天成。"],["事業","保持清醒頭腦，決策明智，事業順遂。"],["健康","心態平和最養生，保持好心情。"]]},
  { num:"第十六番", rank:"小吉", rankColor:"#7A5C00", verse:"種瓜得瓜實，種豆得豆莢。\n善念結善果，因果自有法。", reading:"此籤示因果之道。所種為何，所收即為何。廣結善緣，多行善事，善因必結善果，吉祥自然而至。", items:[["願望","廣積善緣，所求之事漸漸成形。"],["緣分","善待他人，自然吸引善緣到來。"],["事業","誠信為本，積累口碑，長遠發展。"],["健康","身心善待，健康自來。"]]},
  { num:"第十七番", rank:"吉", rankColor:"#1A5C1A", verse:"千里馬常有，伯樂不常有。\n是金子必光，待時靜靜守。", reading:"此籤示人才終被識之兆。是金子終會發光，不必急於表現。繼續充實自己，厚積薄發，機遇到來時，必能一鳴驚人。", items:[["願望","實力到位，機會自來，靜待時機。"],["緣分","有緣人終會相遇，不必強求。"],["事業","繼續累積實力，貴人相助之日不遠。"],["健康","養精蓄銳，為迎接機遇做好準備。"]]},
  { num:"第十八番", rank:"中吉", rankColor:"#1A3A8B", verse:"水善利萬物，柔弱勝剛強。\n以退為進道，柔韌方久長。", reading:"此籤示柔韌之道。以柔克剛，以退為進，看似示弱，實則蘊含大智慧。不必正面衝突，以迂迴之法達成目的，事半功倍。", items:[["願望","迂迴達成，以柔克剛，目標終至。"],["緣分","溫柔體貼更勝強硬，感情漸暖。"],["事業","靈活應變，以柔克剛，困難迎刃而解。"],["健康","柔緩運動如瑜伽太極，最益身心。"]]},
  { num:"第十九番", rank:"大吉", rankColor:"#8B1A1A", verse:"旭日東升霞萬丈，雄鷹展翅沖霄漢。\n此時正是揚帆日，乘風破浪萬里還。", reading:"此籤如旭日初升，萬象更新之兆。一切阻礙已然消散，前路光明坦蕩。此時宜大展宏圖，乘勢而起，必有輝煌成就。", items:[["願望","心想事成，且來得比預期更快更好。"],["緣分","感情進入全新階段，甜蜜美滿。"],["事業","大展宏圖的最佳時機，勇敢出發。"],["健康","活力充沛，狀態絕佳，可挑戰新目標。"]]},
  { num:"第二十番", rank:"末吉", rankColor:"#4a4a4a", verse:"隱忍待時機，蓄力待春雷。\n臥薪嘗膽日，終有翻身來。", reading:"此籤示忍耐之道。當下形勢不利，宜臥薪嘗膽，以忍為上。痛苦乃磨礪之石，苦盡必甘來，翻身之日終將到來。", items:[["願望","暫時忍耐，蓄積能量，翻身在即。"],["緣分","感情暫處低谷，考驗過後更堅固。"],["事業","不是最佳出手時機，默默積累實力。"],["健康","身體需要休養，給自己多一點時間。"]]},
  { num:"第二十一番", rank:"吉", rankColor:"#1A5C1A", verse:"百花齊放春色美，萬紫千紅各爭輝。\n做得自己最真實，自然散發好光輝。", reading:"此籤示真實之道。做最真實的自己，不必刻意偽裝迎合。真誠之人自有真誠之緣，真實之心自招真實之福。", items:[["願望","真心所求，必得真實之回應。"],["緣分","做自己，自然吸引對的人到來。"],["事業","發揮個人特長，走出獨特之路。"],["健康","身心真實，拒絕壓抑，健康自來。"]]},
  { num:"第二十二番", rank:"中吉", rankColor:"#1A3A8B", verse:"三人行必有我師，謙虛受教智慧增。\n學海無涯勤為舟，知識財富永相隨。", reading:"此籤勉人以謙遜好學之心。虛心求教，廣納善言，學無止境。知識乃最大財富，勤學不輟，智慧日增，前程自然廣闊。", items:[["願望","以謙遜之心求之，必得意想不到的助力。"],["緣分","向對方多學習，感情在互相成長中昇華。"],["事業","此時宜學習進修，充電蓄力。"],["健康","學習新的健康知識，改善生活方式。"]]},
  { num:"第二十三番", rank:"小吉", rankColor:"#7A5C00", verse:"螢火蟲雖小，亦能照黑暗。\n莫輕己之力，點滴皆有用。", reading:"此籤示勿輕視自身之力。即便力量微小，亦有其用武之地。螢火蟲雖不及明月，然能照黑暗一隅，貢獻自己所能，即為功德。", items:[["願望","從力所能及之事做起，積小成大。"],["緣分","以真誠小舉動感動對方，日久生情。"],["事業","發揮所長，即便是小貢獻，亦受重視。"],["健康","從小習慣改起，積少成多，身體漸佳。"]]},
  { num:"第二十四番", rank:"吉", rankColor:"#1A5C1A", verse:"漁翁得水魚，鳥入青雲路。\n各得其所宜，順天自逍遙。", reading:"此籤示順應天命之道。魚得水而暢遊，鳥入雲而翱翔，各得其所。找到適合自己的位置，順應本性而為，自然逍遙自在。", items:[["願望","找到真正想要的，而非隨波逐流。"],["緣分","尋找真正契合之人，而非湊合將就。"],["事業","找到適合自己的方向，方能事半功倍。"],["健康","順應身體需求，不強迫，自然健康。"]]},
  { num:"第二十五番", rank:"大吉", rankColor:"#8B1A1A", verse:"萬事俱備東風來，扶搖直上九萬里。\n此時不搏更待何，天賜良機豈可違。", reading:"此籤示天賜良機之兆。萬事俱備，只欠東風，而今東風已至。此時不把握，更待何時？勇敢出擊，天助自助者，必成大業。", items:[["願望","天時地利人和皆備，所願必成。"],["緣分","命中注定之人已出現，勇敢表白。"],["事業","千載難逢之機，大膽決策，勇往直前。"],["健康","狀態巔峰，可挑戰自己的極限。"]]},
  { num:"第二十六番", rank:"中吉", rankColor:"#1A3A8B", verse:"有捨方有得，放下方輕鬆。\n執念是枷鎖，隨緣自通融。", reading:"此籤示捨得之道。執著於一處，反而障礙重重。放下執念，以空杯之心迎接新事物，方能有所得。有時候，放棄也是一種智慧。", items:[["願望","或需放下舊念，方能迎接更好的。"],["緣分","放下過去，方能迎接真正屬於你的緣分。"],["事業","適時放手某些事，才能騰出空間發展。"],["健康","放下壓力與執念，身心自然輕盈。"]]},
  { num:"第二十七番", rank:"吉", rankColor:"#1A5C1A", verse:"竹節雖有節，不礙青雲志。\n逢山開出路，遇水搭起橋。", reading:"此籤示逢山開路之勇氣。困難是磨刀石，挑戰是試金石。面對阻礙，不退縮，以智慧和勇氣開拓出路，必能突破困境。", items:[["願望","面對阻礙勇往直前，方能突破達成。"],["緣分","感情有阻礙，以誠心智慧化解。"],["事業","有挑戰宜積極應對，克服即是成長。"],["健康","克服惰性，堅持鍛鍊，必見成效。"]]},
  { num:"第二十八番", rank:"小吉", rankColor:"#7A5C00", verse:"彎弓須滿月，蓄力待發時。\n不鳴則已矣，一鳴驚天地。", reading:"此籤示蓄力待發之道。弓滿方能射遠，力蓄方能致遠。此時雖未至出手之時，然積蓄之力已足，一旦時機成熟，必能一鳴驚人。", items:[["願望","時機未到，繼續準備，待發之時必驚人。"],["緣分","感情蓄勢待發，水到渠成之日不遠。"],["事業","積累足夠實力，等待最佳出擊時機。"],["健康","蓄積體能，為即將到來的挑戰做準備。"]]},
  { num:"第二十九番", rank:"末吉", rankColor:"#4a4a4a", verse:"冬至陽氣生，一陽來復時。\n至暗過後明，轉機就在此。", reading:"此籤示一陽來復之兆。至暗之時，恰是轉機之始。冬至過後，陽氣漸生，春天雖遠，卻已在路上。堅持住，曙光已現。", items:[["願望","至暗時刻已過，轉機悄然而至。"],["緣分","感情低潮過後，新的篇章即將開始。"],["事業","最艱難時期已過，好轉信號漸現。"],["健康","慢慢恢復中，給身體多一點時間。"]]},
  { num:"第三十番", rank:"大吉", rankColor:"#8B1A1A", verse:"鯤鵬志存高遠處，展翅九萬里雲天。\n不積矽步無以至，此時揚帆正當先。", reading:"此籤鯤鵬展翅之大吉兆。胸懷大志，積極行動，天地廣闊，任你馳騁。此時進取，必能成就非凡事業，名揚四方。", items:[["願望","志存高遠，神明助力，宏願必成。"],["緣分","真命天子天女就在不遠，喜事將至。"],["事業","此時宜大膽擴展，貴人相助，前景廣闊。"],["健康","精力充沛如朝陽，挑戰極限正當時。"]]},
  { num:"第三十一番", rank:"吉", rankColor:"#1A5C1A", verse:"梅花香自苦寒來，寶劍鋒從磨礪出。\n歷盡千帆皆不是，驀然回首燈火處。", reading:"此籤示歷練之功。凡成大器者，必歷苦難磨礪。回望走過之路，每一段艱辛皆是寶貴財富。感恩過去，方能珍惜當下。", items:[["願望","歷經波折之後，所求更有意義與重量。"],["緣分","經歷過後，更懂得珍惜真正的感情。"],["事業","歷練越多，能力越強，前途越廣。"],["健康","曾經的健康挑戰讓你更懂得珍惜健康。"]]},
  { num:"第三十二番", rank:"中吉", rankColor:"#1A3A8B", verse:"人生如棋局，落子須謹慎。\n謀定而後動，步步皆有因。", reading:"此籤示謀定後動之道。凡事不可草率行事，需深思熟慮，謀定而後動。下好每一步棋，步步為營，自然能在人生棋局中佔得先機。", items:[["願望","謀定後動，把握時機，穩妥達成。"],["緣分","感情宜認真對待，不可兒戲。"],["事業","制定周詳計劃，按部就班執行。"],["健康","制定健康計劃並持之以恆執行。"]]},
  { num:"第三十三番", rank:"吉", rankColor:"#1A5C1A", verse:"三十三天天外天，天高任鳥任意飛。\n心有多寬天有多寬，海闊天空自逍遙。", reading:"此籤示心胸開闊之象。心有多寬，天地便有多寬。放開格局，擴展視野，以更高的角度看待人生，煩惱自然消散，機遇不請自來。", items:[["願望","放開格局，所求之事自然水到渠成。"],["緣分","心胸開闊，自然吸引好緣分。"],["事業","拓展視野，發現更多可能性。"],["健康","心寬則體健，好心態是最好的藥。"]]},
  { num:"第三十四番", rank:"小吉", rankColor:"#7A5C00", verse:"小橋流水人家處，靜享尋常一日長。\n不羨功名在遠處，此刻清歡最難忘。", reading:"此籤示知足常樂之道。功名利祿固然重要，然生活中的小確幸，平淡中的小美好，才是真正難以忘懷的珍貴時光。知足者常樂。", items:[["願望","調整期望，珍惜當下已擁有之幸福。"],["緣分","平凡日子裡，感情在點滴中昇華。"],["事業","享受當下的工作狀態，不必總想更多。"],["健康","放慢腳步，享受生活，身心自然舒暢。"]]},
  { num:"第三十五番", rank:"大吉", rankColor:"#8B1A1A", verse:"寶蓮燈初放，金光照四方。\n吉星臨頭頂，萬福降家堂。", reading:"此籤吉光普照之大瑞象。神明特賜福澤，家宅平安，事業有成，身體康健。此乃難得之大吉籤，宜廣積善德，以報神恩。", items:[["願望","萬事如意，所求皆得，福澤綿延。"],["緣分","鴛鴦成對，佳偶天成，喜事連連。"],["事業","財運亨通，事業鴻圖，指日可待。"],["健康","精神飽滿，百病不侵，福壽雙全。"]]},
  { num:"第三十六番", rank:"末吉", rankColor:"#4a4a4a", verse:"逆風方顯帆船勇，浪大更見水手能。\n凡事最怕認真字，人生難在堅持中。", reading:"此籤示逆境見真章之道。正是在逆境中，才能真正見到一個人的品格與能力。堅持下去，困難終會過去，而留下的是更強大的自己。", items:[["願望","雖有阻礙，堅持之心必感動神明。"],["緣分","共同面對逆境，才是真感情的試金石。"],["事業","逆境中更要堅持，韌性是最大的競爭力。"],["健康","即便身體不適，堅持養生，終見成效。"]]},
  { num:"第三十七番", rank:"吉", rankColor:"#1A5C1A", verse:"萬丈高樓平地起，千里之行腳下始。\n有志者事竟成矣，功到自然成一時。", reading:"此籤示有志者事竟成之兆。志向乃成功之本，有了堅定的目標，再配合踏實的行動，無論多高的山峰，皆可攀越。", items:[["願望","志向堅定，行動踏實，所願必成。"],["緣分","明確知道想要的，勇敢追求真愛。"],["事業","設立明確目標，逐步實現，成功在望。"],["健康","設立健康目標，有計劃地執行。"]]},
  { num:"第三十八番", rank:"中吉", rankColor:"#1A3A8B", verse:"一葉落知天下秋，細微之處見智慧。\n觀察入微識先機，洞察秋毫謀大局。", reading:"此籤示洞察細微之道。善於觀察，方能見微知著，把握先機。凡事不可粗枝大葉，細節決定成敗，用心觀察，自能洞燭機先。", items:[["願望","留意細節，把握隱藏的機緣。"],["緣分","細心觀察，你會發現對方的心意。"],["事業","魔鬼在細節裡，精益求精方能出類拔萃。"],["健康","留意身體細微信號，防患於未然。"]]},
  { num:"第三十九番", rank:"吉", rankColor:"#1A5C1A", verse:"桃李不言自成蹊，誠信為本道德立。\n君子一諾重千金，言行一致天地知。", reading:"此籤示誠信之重。誠信乃立身之本，言出必行，行必有果。以誠信待人，雖不張揚，然口碑自立，貴人自然而至。", items:[["願望","以誠信求之，必得誠信之回應。"],["緣分","真誠相待，感情基礎穩固。"],["事業","誠信是最好的名片，口碑勝過廣告。"],["健康","言行一致，說到做到，健康習慣自然養成。"]]},
  { num:"第四十番", rank:"小吉", rankColor:"#7A5C00", verse:"莫道桑榆晚，為霞尚滿天。\n夕陽無限好，只是近黃昏。", reading:"此籤示珍惜當下之道。無論身處何種境地，當下皆有其美好之處。莫要只顧遠方而忽略腳下，夕陽之美，不遜朝陽。珍惜此刻。", items:[["願望","珍惜當下擁有，感恩已得之福。"],["緣分","不要因為追求完美而錯過眼前的緣分。"],["事業","珍惜當前的工作機會與環境。"],["健康","珍惜健康，趁現在好好保養。"]]},
  { num:"第四十一番", rank:"大吉", rankColor:"#8B1A1A", verse:"天時地利人和備，一舉成名天下知。\n此籤上上吉祥兆，萬事順遂如意時。", reading:"此籤天時地利人和俱備之大吉兆。三才齊備，萬事俱順。此時出手，成功概率極高，貴人相助，神明護佑，必成大事。", items:[["願望","三才齊備，所求之事水到渠成。"],["緣分","天賜良緣，此時表白必成。"],["事業","天時地利人和，大展宏圖正當時。"],["健康","身心靈俱佳，狀態絕佳。"]]},
  { num:"第四十二番", rank:"末吉", rankColor:"#4a4a4a", verse:"忍得一時氣，免得百日憂。\n退一步海闊，讓三分天寬。", reading:"此籤示忍讓之道。一時之忿，往往釀成大禍。忍一時之氣，退一步之位，反而開闊了天地。以讓代爭，以柔克剛，是大智慧。", items:[["願望","暫時退讓，以退為進，時機成熟再出手。"],["緣分","感情有摩擦，讓步一方往往化解危機。"],["事業","職場中學會忍讓，以和為貴，長遠更佳。"],["健康","勿意氣用事損傷身體，以平和心態養生。"]]},
  { num:"第四十三番", rank:"吉", rankColor:"#1A5C1A", verse:"問渠哪得清如許，為有源頭活水來。\n不斷學習與成長，智慧之泉永不枯。", reading:"此籤示持續學習之道。智慧如活水，唯有不斷學習，方能保持清澈流動。此時宜廣泛涉獵，充實自我。", items:[["願望","以知識充實自己，提升達成目標的能力。"],["緣分","共同成長的伴侶，是最好的緣分。"],["事業","此時宜學習新技能，為事業升級充電。"],["健康","學習健康知識，以科學方式保養身體。"]]},
  { num:"第四十四番", rank:"中吉", rankColor:"#1A3A8B", verse:"旁觀者清當局迷，跳出局外看全局。\n山重水複疑無路，柳暗花明又一村。", reading:"此籤示跳出困局之道。當局者迷，旁觀者清。困惑之時，不妨暫時抽離，以旁觀者的角度審視，往往豁然開朗，峰迴路轉。", items:[["願望","換個角度思考，也許解法就在眼前。"],["緣分","跳出固有思維，以新視角看待感情。"],["事業","遇到瓶頸時，跳出框架思考，自有出路。"],["健康","嘗試不同的健康方法，也許有意想不到的效果。"]]},
  { num:"第四十五番", rank:"吉", rankColor:"#1A5C1A", verse:"禍兮福之所倚，福兮禍之所伏。\n塞翁失馬焉知非福，轉念之間天地寬。", reading:"此籤示禍福相依之道。世事難以預料，禍福皆在一念之間。以樂觀之心看待所有境遇，壞事或許是好事的開端，塞翁失馬，焉知非福。", items:[["願望","以樂觀心態面對，失之東隅，收之桑榆。"],["緣分","失去的未必是最好的，更好的緣分在等待。"],["事業","失敗或挫折，往往是成功前的必要鋪墊。"],["健康","以積極心態面對健康挑戰，身體自有復原力。"]]},
  { num:"第四十六番", rank:"小吉", rankColor:"#7A5C00", verse:"千里之堤潰蟻穴，防微杜漸智者為。\n小事勿輕忽，細節定成敗。", reading:"此籤示防微杜漸之道。大問題往往源自小疏忽。從小事做起，防患於未然，不讓小問題積累成大麻煩，此乃智者之道。", items:[["願望","留意小細節，防止小問題影響大目標。"],["緣分","感情中的小摩擦宜及早化解，勿積怨。"],["事業","處理好每個小環節，大事自然成功。"],["健康","注意小症狀，早發現早治療，防患未然。"]]},
  { num:"第四十七番", rank:"大吉", rankColor:"#8B1A1A", verse:"神龍見首不見尾，福澤無邊難盡言。\n今日得此大吉籤，萬事如意皆自然。", reading:"此籤神龍賜福之大吉兆。神明之福澤，深不可測，廣不可量。此籤得者，乃天命之人，萬事自然順遂，福氣綿延不絕。", items:[["願望","天命眷顧，所有心願，皆得圓滿。"],["緣分","天作之合，緣定三生，幸福美滿。"],["事業","龍騰虎躍，事業宏圖，財源廣進。"],["健康","福壽雙全，健康長壽，神明庇佑。"]]},
  { num:"第四十八番", rank:"吉", rankColor:"#1A5C1A", verse:"眾人拾柴火焰高，合作共贏天下知。\n獨木難支大廈立，借力借勢借東風。", reading:"此籤示合作共贏之道。一個人的力量有限，善於借助他人之力，匯聚眾人之智，方能成就大事。此時宜廣結善緣，借力發力。", items:[["願望","借助他人力量，共同實現心願。"],["緣分","雙方合作，感情更上一層樓。"],["事業","團隊合作，集思廣益，事業更上層樓。"],["健康","尋求專業幫助，借助外力提升健康。"]]},
  { num:"第四十九番", rank:"中吉", rankColor:"#1A3A8B", verse:"凡事留一線，日後好相見。\n寬以待人者，必得人心歸。", reading:"此籤示寬容之道。以寬廣之心待人，凡事留有餘地，不咄咄逼人。寬容是一種大智慧，也是贏得人心的最佳方式。", items:[["願望","以寬容之心求之，人和則事成。"],["緣分","包容對方的不完美，感情更加堅固。"],["事業","待人寬厚，廣結善緣，口碑自立。"],["健康","寬容自己的不完美，以平和心態養生。"]]},
  { num:"第五十番", rank:"末吉", rankColor:"#4a4a4a", verse:"物極必反古訓在，盛極而衰自然道。\n知足知止大智慧，月滿則虧水滿溢。", reading:"此籤示知足知止之道。物極必反，盈滿則虧，此天道也。凡事勿過度追求，知足者常樂，知止者長安，適可而止乃大智慧。", items:[["願望","知足常樂，調整期望，反得更多。"],["緣分","感情中勿過度佔有，給彼此空間。"],["事業","適時收手，勿過度擴張，穩中求進。"],["健康","勿過度鍛鍊，適度才是最好的養生。"]]},
  { num:"第五十一番", rank:"大吉", rankColor:"#8B1A1A", verse:"祥雲瑞氣繞，福星高照臨。\n吉兆連連至，萬事皆順心。", reading:"此籤祥雲瑞氣之大吉象。天降祥瑞，福星高照，此時做任何事皆得天助。把握吉時，積極行動，必能心想事成，萬事順遂。", items:[["願望","祥瑞臨門，所有心願指日可待。"],["緣分","鴻福齊天，美好姻緣天賜而來。"],["事業","一帆風順，事業高歌猛進。"],["健康","氣色紅潤，精力十足，健康滿分。"]]},
  { num:"第五十二番", rank:"吉", rankColor:"#1A5C1A", verse:"鳳凰涅槃火中生，重生之後更輝煌。\n歷盡艱辛方見彩，柳暗花明別有天。", reading:"此籤示浴火重生之象。經歷過最艱難的時刻，如今已走出困境，煥然一新。此番重生，必比從前更加強大，更加精彩。", items:[["願望","重新出發，歷練後的願望更加清晰有力。"],["緣分","走過低谷，感情更加成熟堅定。"],["事業","重整旗鼓，重新出發，前景更加光明。"],["健康","身體已在恢復中，比從前更加重視健康。"]]},
  { num:"第五十三番", rank:"中吉", rankColor:"#1A3A8B", verse:"花開花謝自有時，強求不來緣自來。\n人生際遇如潮水，漲落皆是自然事。", reading:"此籤示自然之道。萬事有其自然之時節，強求反而適得其反。順應自然，不強求，不抗拒，該來的自然會來，該去的留不住。", items:[["願望","順應自然，不強求，緣到自成。"],["緣分","緣分天注定，不必強求，順其自然。"],["事業","時機未到，強求無益，靜待時機。"],["健康","順應身體自然節律，不強迫，自然康健。"]]},
  { num:"第五十四番", rank:"吉", rankColor:"#1A5C1A", verse:"海納百川有容乃大，壁立千仞無欲則剛。\n心懷大愛天地寬廣，包容萬物自得逍遙。", reading:"此籤示大愛包容之道。心懷大愛，包容萬物，方能成就偉大。己所不欲勿施於人，以愛待人，感化四方，天地自然廣闊。", items:[["願望","以大愛之心求之，感動天地，所願必達。"],["緣分","包容與愛，是感情最堅實的基礎。"],["事業","以仁愛之心待人，人心歸附，事業自成。"],["健康","大愛之心，無私之念，身心皆得健康。"]]},
  { num:"第五十五番", rank:"小吉", rankColor:"#7A5C00", verse:"勿以惡小而為之，勿以善小而不為。\n積善之家必有餘，善念善行善果來。", reading:"此籤示積善之道。善惡皆由小事積累而成。勿輕視小善小惡，點滴善行積累，自然厚積善緣，福報隨之而來。", items:[["願望","廣積善行，善因必結善果，所願必成。"],["緣分","善待身邊每一個人，善緣自然而來。"],["事業","以善為本，誠信經營，必得長遠回報。"],["健康","善待自己的身體，細心呵護，健康長壽。"]]},
  { num:"第五十六番", rank:"大吉", rankColor:"#8B1A1A", verse:"日月同輝耀乾坤，陰陽和合萬物生。\n此籤天地共佑者，所謀之事盡皆成。", reading:"此籤日月同輝之大吉兆，陰陽調和，天地共佑。此等難得之籤，示神明對求籤者之特別眷顧。凡所謀事，無不如意。", items:[["願望","天地共佑，所有心願，一一實現。"],["緣分","日月為證，天作之合，愛情圓滿。"],["事業","陰陽調和，事業各方面皆順遂發展。"],["健康","天地同護，身心靈三方面皆健康美滿。"]]},
  { num:"第五十七番", rank:"末吉", rankColor:"#4a4a4a", verse:"十年磨一劍，霜刃未曾試。\n今日把示君，誰有不平事。", reading:"此籤示十年磨劍之功。長期的積累與磨礪，已讓你具備了相當的實力。但時機尚未成熟，繼續等待最佳出劍時機，一出必驚人。", items:[["願望","實力已備，靜待最佳時機出手。"],["緣分","暗中蓄力，等待最佳表白時機。"],["事業","積累夠了，等一個能展示實力的舞台。"],["健康","體力蓄積中，為更大的挑戰做準備。"]]},
  { num:"第五十八番", rank:"吉", rankColor:"#1A5C1A", verse:"天下事有難易乎，學之則難者易矣。\n不學則易者難矣，學而知之識廣博。", reading:"此籤示學習之重。世上難事，學之皆可化難為易。持續學習，擴充知識，開闊視野，原本棘手之事，自然迎刃而解。", items:[["願望","以知識武裝自己，所求之事化難為易。"],["緣分","多學習如何經營感情，自然進步。"],["事業","投資於學習，是最佳的事業投資。"],["健康","學習健康知識，以智慧保護自己的身體。"]]},
  { num:"第五十九番", rank:"中吉", rankColor:"#1A3A8B", verse:"一花一世界，一葉一菩提。\n小事見大道，細處有真機。", reading:"此籤示見微知著之道。宏大之道，往往隱藏於日常細微之中。用心觀察生活中的點點滴滴，自能在平凡之中發現非凡的智慧。", items:[["願望","在日常小事中尋找答案，機緣或在其中。"],["緣分","用心感受對方的細節，愛在細微之處。"],["事業","從小處改善，積累的效果驚人。"],["健康","關注日常小習慣，細節決定健康品質。"]]},
  { num:"第六十番", rank:"吉", rankColor:"#1A5C1A", verse:"博觀約取厚積薄發，千錘百煉方成大器。\n成功路上無捷徑，唯有勤耕自有收。", reading:"此籤示厚積薄發之道。廣博涉獵，精選吸收，長期積累，一旦時機成熟，必能厚積薄發，一飛沖天，令人刮目相看。", items:[["願望","厚積薄發，時機到來時，必有驚人成就。"],["緣分","深厚的情感積累，終將開出美麗花朵。"],["事業","廣博學習，深度積累，成大器指日可待。"],["健康","長期堅持健康習慣，厚積薄發，效果驚人。"]]},
  { num:"第六十一番", rank:"小吉", rankColor:"#7A5C00", verse:"高山仰止景行行止，雖不能至心嚮往之。\n立大志向效賢者，循序漸進終達峰。", reading:"此籤示立志效賢之道。仰望前賢，以其為標竿，雖一時難及，然心嚮往之，循序漸進，必能日益精進，終至高峰。", items:[["願望","以高標準要求自己，超越目標指日可待。"],["緣分","以優秀的人為榜樣，提升自己，吸引佳緣。"],["事業","效法業界典範，不斷精進，終成一家之言。"],["健康","以健康達人為榜樣，逐步改善生活方式。"]]},
  { num:"第六十二番", rank:"大吉", rankColor:"#8B1A1A", verse:"紫氣東來三萬里，函關初度五千年。\n大吉之籤難得遇，此番神助定功成。", reading:"此籤紫氣東來之大吉瑞象。紫氣祥雲，千里而來，專程護佑求籤者。此番神助，凡所謀事，無不成就。宜廣行善事，以報此恩。", items:[["願望","紫氣護佑，所有心願，皆得圓滿成就。"],["緣分","紫霞仙緣，天賜良緣，此生幸福美滿。"],["事業","紫氣加持，事業騰飛，財源廣進，名揚四方。"],["健康","祥氣護體，百病不侵，長壽健康，神明庇佑。"]]},
  { num:"第六十三番", rank:"末吉", rankColor:"#4a4a4a", verse:"破繭方成蝶，熬過最艱時。\n不經一番寒徹骨，哪得梅花撲鼻香。", reading:"此籤示破繭成蝶之道。眼前的艱難，正是脫胎換骨的必經之路。如蝶在繭中，看似困頓，實則積蓄力量，破繭之日，必展翅高飛。", items:[["願望","艱難之後必有蛻變，所願在破繭後實現。"],["緣分","感情的考驗，是雙方升華的契機。"],["事業","最艱難的時候，往往是蛻變的前夜。"],["健康","病痛是身體在提示你需要改變，聽從身體的聲音。"]]},
  { num:"第六十四番", rank:"吉", rankColor:"#1A5C1A", verse:"天道酬勤古來有，一份耕耘一份收。\n任爾東西南北風，我自勤耕不停留。", reading:"此籤示天道酬勤之兆。上天從不虧待勤勞之人，一分耕耘必有一分收穫。堅持勤奮，不問結果，付出之後，回報自然而來。", items:[["願望","勤奮耕耘，天道酬勤，所願必達。"],["緣分","用心經營，感情的收穫與付出成正比。"],["事業","勤奮是最可靠的競爭力，努力必有回報。"],["健康","堅持運動，持之以恆，身體必見改善。"]]},
  { num:"第六十五番", rank:"中吉", rankColor:"#1A3A8B", verse:"路漫漫其修遠兮，吾將上下而求索。\n不畏浮雲遮望眼，只緣身在最高層。", reading:"此籤示不懈求索之道。理想之路漫長，充滿未知，然只要不停探索，終能站在高處，撥雲見日，洞察全局，所謀自明。", items:[["願望","不懈求索，答案終將在探索中浮現。"],["緣分","愛情需要不斷探索與發現，方能持久。"],["事業","持續探索新方向，突破現有瓶頸。"],["健康","嘗試不同的健康方式，找到最適合自己的。"]]},
  { num:"第六十六番", rank:"吉", rankColor:"#1A5C1A", verse:"六六大順運來到，萬事吉祥自然好。\n此番神助諸事順，順風順水福祿壽。", reading:"此籤六六大順之吉兆。六六乃吉數，萬事皆順，福祿壽三星拱照。此時行事，處處逢貴，步步踏實，自然大吉大利。", items:[["願望","六六大順，所有心願皆得順利實現。"],["緣分","順水行舟，感情自然進入甜蜜階段。"],["事業","順勢而為，事業一帆風順，財源滾滾。"],["健康","氣血暢通，身體各方面皆順暢健康。"]]},
  { num:"第六十七番", rank:"小吉", rankColor:"#7A5C00", verse:"謹言慎行君子道，多做少說見真章。\n言多必失古訓在，靜水流深有乾坤。", reading:"此籤示謹言慎行之道。此時宜多做少說，以行動代替語言。靜水流深，不動聲色，暗中積累實力，時機成熟自然顯山露水。", items:[["願望","以行動代替空話，默默耕耘，成果自現。"],["緣分","行動勝於語言，用真心感動對方。"],["事業","低調行事，默默積累，比張揚更有效。"],["健康","少說多做，把時間用在真正的健康行動上。"]]},
  { num:"第六十八番", rank:"大吉", rankColor:"#8B1A1A", verse:"慶雲朵朵繞仙台，吉星拱照福門開。\n此時求籤得大吉，神明特賜百福來。", reading:"此籤慶雲拱照之大吉象。神明特賜此籤，示求籤者福緣深厚，天命眷顧。凡所謀求，皆得神佑，萬事大吉，百福齊來。", items:[["願望","百福齊來，所有心願，皆蒙神賜，必得實現。"],["緣分","福緣深厚，天賜好緣，一生幸福美滿。"],["事業","財星高照，事業大展，名利雙收。"],["健康","神明護體，百病皆消，健康長壽。"]]},
  { num:"第六十九番", rank:"末吉", rankColor:"#4a4a4a", verse:"不識廬山真面目，只緣身在此山中。\n置身局外看局內，清醒自知方解惑。", reading:"此籤示跳出困局之道。困惑之時，往往是因為陷得太深，無法看清全局。嘗試抽離，尋求旁觀者的建議，或許一語道破迷津。", items:[["願望","換個角度，或許就能找到達成目標的方法。"],["緣分","旁觀者清，尋求信任之人的建議。"],["事業","跳出固有思維，尋求外部視角，豁然開朗。"],["健康","聽從醫生建議，旁觀者更清楚你的健康狀況。"]]},
  { num:"第七十番", rank:"吉", rankColor:"#1A5C1A", verse:"生命在於運動動，流水不腐戶樞蠹。\n動靜相宜有節律，陰陽調和萬物榮。", reading:"此籤示動靜相宜之道。生命在於運動，然亦需有靜養之時。動靜相宜，陰陽調和，方能長久保持旺盛生命力，萬事皆興。", items:[["願望","以積極行動配合耐心等待，所願終成。"],["緣分","主動與被動相宜，感情自然平衡發展。"],["事業","衝勁與沉穩並重，事業發展最為健康。"],["健康","動靜結合，運動與休息相配，身體最健康。"]]},
  { num:"第七十一番", rank:"中吉", rankColor:"#1A3A8B", verse:"山不在高有仙則名，水不在深有龍則靈。\n斯是陋室惟吾德馨，品格高潔自然馨。", reading:"此籤示德行之重。外在條件固然重要，然內在品格才是根本。德行高尚之人，不論處於何種環境，皆能散發獨特魅力，自然受人敬重。", items:[["願望","以德行感動天地，所求之事自然成就。"],["緣分","品格高尚者，自然吸引同等品格之良緣。"],["事業","以德服人，比以力服人更長遠更有力。"],["健康","品格端正，內心安定，身心自然健康。"]]},
  { num:"第七十二番", rank:"吉", rankColor:"#1A5C1A", verse:"飲水思源感恩心，知恩圖報德義行。\n感恩之心招百福，福報自然如泉湧。", reading:"此籤示感恩之道。心懷感恩，飲水思源，不忘來時路。感恩之心，是招引福報的最大磁場。常懷感恩，福報如泉水般源源不斷。", items:[["願望","感恩已有，自然吸引更多美好事物到來。"],["緣分","感恩對方，珍惜緣分，感情加倍美滿。"],["事業","感恩貴人提攜，廣結善緣，福報回流。"],["健康","感恩身體的每一次自我修復，善待自己。"]]},
  { num:"第七十三番", rank:"凶", rankColor:"#6B1A1A", verse:"烏雲壓城城欲摧，甲光向日金鱗開。\n莫道前途多風雨，守得雲開見月明。", reading:"此籤示警之兆，諸事宜謹慎。然凶非絕境，乃神明之提示，令人警醒反思。凡事放低姿態，廣納善言，勿意氣用事。困厄過後，必見曙光。可赴本殿拜神，誠心祈求護佑。", items:[["願望","所求暫難如願，宜反思方向，調整心態。"],["緣分","感情有波折，冷靜溝通，切忌衝動。"],["事業","謹防小人，慎言慎行，暫緩新計畫。"],["健康","體弱易病，注意保暖，定期檢查身體。"]]},
  { num:"第七十四番", rank:"小吉", rankColor:"#7A5C00", verse:"鳥欲高飛先振翅，人求上進先讀書。\n知識是力量源泉，武裝頭腦走天下。", reading:"此籤示讀書上進之道。欲展翅高飛，先需振翅練習。廣泛閱讀，汲取知識，武裝頭腦，方能在各種情況下應對自如，事業有成。", items:[["願望","以知識充實自己，達成目標的路更清晰。"],["緣分","提升自己，才能吸引更好的緣分。"],["事業","投資於學習知識，是最划算的事業投資。"],["健康","學習正確的健康觀念，事半功倍。"]]},
  { num:"第七十五番", rank:"大吉", rankColor:"#8B1A1A", verse:"萬紫千紅春色美，百花齊放香滿園。\n此番大吉天所賜，百事俱宜喜連連。", reading:"此籤春色滿園之大吉象。萬紫千紅，百花齊放，吉祥之氣瀰漫四方。此時萬事俱宜，如春風化雨，所有美好之事皆將應時而至。", items:[["願望","春風得意，所有心願如百花開放，一一實現。"],["緣分","桃花盛開，良緣天降，感情花開並蒂。"],["事業","春風得意，事業如花盛開，財源廣進。"],["健康","春回大地，身體如萬物復甦，健康滿滿。"]]},
  { num:"第七十六番", rank:"末吉", rankColor:"#4a4a4a", verse:"三思而後行，謀定而後動。\n急則易出錯，靜心慎思量。", reading:"此籤示三思而行之道。凡事欲速則不達，急躁往往導致失誤。靜下心來，仔細思量，謀定而後動，雖慢一步，卻能避免大錯。", items:[["願望","慎重考慮後再行動，避免衝動行事後悔。"],["緣分","感情中勿急於求成，三思而後行。"],["事業","重大決策前多方考慮，避免衝動決策。"],["健康","嘗試新的健康方法前，先充分了解研究。"]]},
  { num:"第七十七番", rank:"大吉", rankColor:"#8B1A1A", verse:"七七四十九天星斗轉，吉星臨照百福集。\n此時此刻天賜緣，諸事皆宜喜事臨。", reading:"此籤星斗臨照之大吉兆。天上吉星下凡護佑，諸事皆宜，百福集臨。此乃難得之吉籤，求籤者福緣深厚，必成所願。", items:[["願望","星宿護佑，所求必應，吉祥如意。"],["緣分","星月為媒，良緣天定，喜事將至。"],["事業","吉星高照，事業突破，財喜雙收。"],["健康","吉星護體，精神飽滿，健康滿點。"]]},
  { num:"第七十八番", rank:"吉", rankColor:"#1A5C1A", verse:"讀萬卷書行萬里路，閱盡山川識人情。\n讀書破萬卷下筆如有神，行萬里路方知世界寬。", reading:"此籤示讀萬卷書行萬里路之道。知識與閱歷並重，方能成就圓滿人生。多讀書，多旅行，多經歷，眼界廣則心胸寬，智慧自然增長。", items:[["願望","拓寬眼界，豐富閱歷，所求之路越走越寬。"],["緣分","在旅行與探索中，往往遇見命中注定之人。"],["事業","廣博知識與豐富閱歷，是事業成功的基石。"],["健康","走出去，接觸自然，有益身心健康。"]]},
  { num:"第七十九番", rank:"中吉", rankColor:"#1A3A8B", verse:"與朋友交言而有信，責人之心責己身。\n嚴以律己寬待人，此乃君子處世道。", reading:"此籤示君子處世之道。嚴以律己，寬以待人。對自己要有高標準，對他人要有包容之心。以誠信待友，以仁愛待人，自然廣結善緣。", items:[["願望","以誠信為本，君子之行必得善報。"],["緣分","以君子之道待伴侶，感情基礎穩固長久。"],["事業","嚴以律己的專業態度，贏得尊重與信任。"],["健康","對自己的健康嚴格要求，持之以恆。"]]},
  { num:"第八十番", rank:"吉", rankColor:"#1A5C1A", verse:"八方來財運亨通，四面八方皆吉兆。\n廣結善緣天下友，笑迎四方貴人來。", reading:"此籤八方來財之吉兆。廣結善緣，四方皆友，貴人自然從四面八方而來。此時宜廣泛社交，拓展人脈，機緣自然隨之而至。", items:[["願望","廣結善緣，人脈即財脈，所願藉人脈實現。"],["緣分","廣交朋友，在其中遇見真命天子天女。"],["事業","廣泛人脈是最大的事業資產，積極拓展。"],["健康","社交活躍，心情愉快，身心皆得滋養。"]]},
  { num:"第八十一番", rank:"小吉", rankColor:"#7A5C00", verse:"問君能有幾多愁，恰似一江春水向東流。\n放下心中無謂憂，隨緣自在最逍遙。", reading:"此籤示放下憂愁之道。人生煩惱如江水東流，無窮無盡。與其陷入無謂憂慮，不如放下執念，隨緣自在，方能真正享受人生。", items:[["願望","放下憂慮，以輕鬆心態面對，反而更易達成。"],["緣分","放下對感情的過度憂慮，享受當下。"],["事業","不必過分擔憂，以平常心應對職場挑戰。"],["健康","放下焦慮，心情舒暢是最好的養生。"]]},
  { num:"第八十二番", rank:"大吉", rankColor:"#8B1A1A", verse:"八仙過海各顯神通，天賜此籤福無窮。\n諸事皆宜大吉兆，神明護佑步步鬆。", reading:"此籤八仙護佑之大吉兆。八路神仙各施法力，共同護佑求籤者。此番神助，無微不至，所有願望皆蒙眷顧，萬事皆宜。", items:[["願望","八仙護佑，所有心願，皆得成就。"],["緣分","仙緣天定，佳偶良緣，喜事連連。"],["事業","八方助力，事業突飛猛進，名利雙收。"],["健康","神佑保體，百病不侵，長壽康健。"]]},
  { num:"第八十三番", rank:"末吉", rankColor:"#4a4a4a", verse:"人非聖賢孰能無過，過而能改善莫大焉。\n知錯能改方是勇者，改過遷善福自來。", reading:"此籤示知錯能改之道。人非聖賢，難免過失。重要的不是從不犯錯，而是能夠承認錯誤，勇於改正。改過遷善，福報自然而至。", items:[["願望","坦然承認不足，改正後重新出發，必有收穫。"],["緣分","坦誠面對感情中的問題，改善關係。"],["事業","勇於承認錯誤並改正，比掩飾更受尊重。"],["健康","承認不良習慣，積極改善，身體自然好轉。"]]},
  { num:"第八十四番", rank:"吉", rankColor:"#1A5C1A", verse:"天生我材必有用，千金散盡還復來。\n相信自己有能力，天賦才能終閃光。", reading:"此籤示相信自己之道。天生我材必有用，每個人皆有獨特的天賦與才能。相信自己，發揮所長，不妄自菲薄，才能讓才能充分發光。", items:[["願望","相信自己的能力，所求之事必能達成。"],["緣分","自信之人最有魅力，自信吸引好緣分。"],["事業","發揮天賦才能，找到最適合自己的舞台。"],["健康","相信身體的自我修復能力，積極面對。"]]},
  { num:"第八十五番", rank:"中吉", rankColor:"#1A3A8B", verse:"與善人居如入芝蘭室，與惡人居如入鮑魚肆。\n近朱者赤近墨者黑，擇友慎重影響深遠。", reading:"此籤示擇友之重。近朱者赤，近墨者黑，身邊的人對你影響深遠。謹慎選擇交往之人，多與正直善良之人為伍，自然薰陶漸染，向善發展。", items:[["願望","選擇良好的環境與夥伴，所願達成更有助力。"],["緣分","選擇與正直善良之人交往，感情更健康。"],["事業","選擇優秀的合作夥伴，事業更上一層樓。"],["健康","與健康積極的人為伍，生活方式自然改善。"]]},
  { num:"第八十六番", rank:"吉", rankColor:"#1A5C1A", verse:"日行一善積善德，月積善行福自來。\n善念如種入土地，終有花開果實天。", reading:"此籤示日行一善之道。每日行一善事，積少成多，善德自然積累。善念如種入土，雖需時日，然終有花開果熟之時，福報自然而至。", items:[["願望","積善積德，所願之事自然蒙福成就。"],["緣分","善良之心，是吸引善良緣分的最大磁場。"],["事業","以善為本的事業，必得長遠回報。"],["健康","善念善行，身心皆得滋養，健康長壽。"]]},
  { num:"第八十七番", rank:"小吉", rankColor:"#7A5C00", verse:"欲速則不達古訓在，心急難成大事業。\n慢工出細活有道理，穩紮穩打終功成。", reading:"此籤示慢工出細活之道。凡成大業者，皆非一蹴而就。欲速則不達，穩紮穩打，精益求精，雖慢一步，然品質更佳，基礎更穩。", items:[["願望","放慢腳步，把事情做得更好，所願更完美。"],["緣分","感情勿急，細水長流，才是長久之計。"],["事業","穩紮穩打，品質第一，長遠發展更健康。"],["健康","循序漸進，不求速效，健康改善更持久。"]]},
  { num:"第八十八番", rank:"大吉", rankColor:"#8B1A1A", verse:"八八六十四卦盡吉祥，乾坤旋轉運氣昌。\n此籤難得萬中一，神明特賜大福降。", reading:"此籤八八大順之極吉象。八八乃吉數之極，六十四卦俱吉，乾坤旋轉，運氣大昌。此等極吉之籤，萬中難得一見，神明特賜，福澤深厚。", items:[["願望","極吉之籤，所有心願，皆得圓滿完美實現。"],["緣分","天地同慶，緣定三生，幸福無邊無際。"],["事業","乾坤旋轉，事業鴻圖，財源滾滾，名揚天下。"],["健康","八方護體，百福加身，健康長壽，神明特賜。"]]},
  { num:"第八十九番", rank:"末吉", rankColor:"#4a4a4a", verse:"星河燦爛雖遙遠，只要努力終能達。\n腳踏實地仰望天，夢想成真非夢幻。", reading:"此籤示仰望星河之道。夢想雖遠，如星河般璀璨，然只要腳踏實地，一步一步走去，再遠的夢想，終有實現之日。勿讓眼前困難遮蔽夢想之光。", items:[["願望","夢想雖遠，只要不停前行，終有到達之日。"],["緣分","理想的緣分雖高，只要真心追求，終能到達。"],["事業","遠大目標雖遠，腳踏實地，一步一步實現。"],["健康","理想的健康狀態雖遠，持之以恆，終能達到。"]]},
  { num:"第九十番", rank:"吉", rankColor:"#1A5C1A", verse:"九九歸一終有道，萬法歸宗皆自然。\n執其兩端用其中，中道而行最長遠。", reading:"此籤示中道之行。萬法歸宗，最終皆歸於自然中道。不偏激，不極端，執兩端而用中，乃處世之最高智慧，行之必能長遠。", items:[["願望","以中道之心求之，不偏不倚，必得圓滿。"],["緣分","感情中保持中道，不過分依賴，不過分疏離。"],["事業","中道而行，平衡各方關係，事業穩健發展。"],["健康","飲食起居皆走中道，不過分，最益健康。"]]},
  { num:"第九十一番", rank:"中吉", rankColor:"#1A3A8B", verse:"博採眾家之長處，融匯貫通自成家。\n集思廣益眾志成城，群策群力終功成。", reading:"此籤示博採眾長之道。一人之智有限，博採眾家之長，兼收並蓄，融匯貫通，方能自成一家，超越前人，另闢蹊徑。", items:[["願望","廣納建議，集思廣益，達成目標更有把握。"],["緣分","從不同角度理解對方，感情更加豐富深厚。"],["事業","集眾人智慧，群策群力，事業更上層樓。"],["健康","諮詢多方專業意見，找到最適合的健康方案。"]]},
  { num:"第九十二番", rank:"吉", rankColor:"#1A5C1A", verse:"青出於藍而勝於藍，長江後浪推前浪。\n新生代有無限可能，突破傳統自創高峰。", reading:"此籤示青出於藍之兆。年輕一代自有其優勢與可能性。不必受限於傳統框架，勇於突破，創新求變，必能超越前人，創造輝煌。", items:[["願望","突破框架，以創新方式達成目標，超乎預期。"],["緣分","以新鮮感維持感情活力，不落入俗套。"],["事業","創新是最大的競爭力，勇於突破創造新高。"],["健康","嘗試新的健康方法，找到更適合自己的方式。"]]},
  { num:"第九十三番", rank:"小吉", rankColor:"#7A5C00", verse:"千里之行始足下，九層高台起土。\n大道至簡看基礎，根基穩固方能高。", reading:"此籤示夯實基礎之道。高樓萬丈，皆從基礎起。任何宏大目標，皆需紮實的基礎支撐。此時宜回歸基本，夯實根基，之後方能高飛。", items:[["願望","先打好基礎，目標達成後才能持久穩固。"],["緣分","感情的基礎比熱情更重要，用心建立。"],["事業","回歸基本功，紮實基礎是長遠發展的保障。"],["健康","基礎健康習慣最重要，規律作息飲食為本。"]]},
  { num:"第九十四番", rank:"大吉", rankColor:"#8B1A1A", verse:"九四之爻潛龍勿用，然今時機已然至。\n蟄龍出淵龍飛天，大展鴻圖正當時。", reading:"此籤蟄龍出淵之大吉兆。蟄伏已久，蓄積之力已滿，時機終於成熟。此時出手，如龍飛天，必能大展鴻圖，成就非凡事業。", items:[["願望","時機已至，果斷出手，所願必成，且超乎想象。"],["緣分","壓抑已久的感情，此時宜勇敢表達。"],["事業","蟄伏後的爆發，比從未積累者更具衝擊力。"],["健康","蓄積的體能，此時可以盡情發揮，挑戰極限。"]]},
  { num:"第九十五番", rank:"末吉", rankColor:"#4a4a4a", verse:"謙受益滿招損，物極必反道自然。\n盛極而衰知進退，謙遜自持方長久。", reading:"此籤示謙遜之道。謙受益，滿招損，此千古不易之理。即便處於順境，亦要保持謙遜，切忌驕傲自滿。謙遜者，可保長久之福。", items:[["願望","以謙遜之心求之，神明喜謙遜者，自然庇佑。"],["緣分","謙遜待人，自然廣受歡迎，好緣自來。"],["事業","謙遜是職場中最被低估的美德，長遠制勝。"],["健康","謙遜接受自己身體的限制，量力而為。"]]},
  { num:"第九十六番", rank:"吉", rankColor:"#1A5C1A", verse:"路見不平拔刀助，俠義心腸廣結緣。\n仗義疏財濟困難，善緣善果自相連。", reading:"此籤示俠義精神。樂於助人，仗義疏財，廣結善緣。助人者，人必助之。種下善因，必得善果，善緣善果，形成良性循環。", items:[["願望","以助人為樂，善心善行自然感召善果。"],["緣分","助人之時，往往遇見命中貴人與緣分。"],["事業","慷慨助人，建立好口碑，貴人自然相助。"],["健康","助人使人心情愉快，積極正向的情緒益於健康。"]]},
  { num:"第九十七番", rank:"中吉", rankColor:"#1A3A8B", verse:"臨淵羨魚不如退而結網，空想不如腳踏實地行。\n有夢想還需有計畫，計畫執行夢成真。", reading:"此籤示退而結網之道。有夢想是好事，但空有夢想而不行動，終是枉然。制定切實可行的計畫，腳踏實地執行，方能讓夢想照進現實。", items:[["願望","制定具體計畫，按部就班執行，夢想必成現實。"],["緣分","把對感情的渴望化為具體行動，主動追求。"],["事業","制定詳細計畫，分步驟執行，目標必達。"],["健康","把健康目標轉化為具體日常行動計畫。"]]},
  { num:"第九十八番", rank:"吉", rankColor:"#1A5C1A", verse:"九八之數近圓滿，百尺竿頭更進步。\n功成不居君子道，永遠進取不滿足。", reading:"此籤示百尺竿頭更進步之道。即便已接近圓滿，亦要繼續精進，不自滿，不停步。永遠保持學習進取之心，方能持續創造輝煌。", items:[["願望","接近目標之際，更要保持衝勁，一鼓作氣。"],["緣分","感情好之時，更要用心維護，精益求精。"],["事業","即便已有成就，繼續精進，保持競爭力。"],["健康","健康改善之後，繼續保持好習慣，鞏固成果。"]]},
  { num:"第九十九番", rank:"大吉", rankColor:"#8B1A1A", verse:"九九重陽登高望，天長地久福無疆。\n吉慶祥瑞皆臨門，天地神明共護航。", reading:"此籤九九重陽之大吉象，天地神明共同護航。九為陽數之極，九九更是吉上加吉。此等難得之籤，示求籤者福澤深厚，諸事皆成，壽比南山。", items:[["願望","九九歸一，所有心願，圓滿完美，無一遺漏。"],["緣分","天長地久，愛情長壽，如九九重陽，恆久不變。"],["事業","登高望遠，事業版圖越來越大，名利雙收。"],["健康","壽比南山，福如東海，健康長壽，神明同賀。"]]},

const WEIGHTS=[3,8,10,8,5,8,3,10,8,8,8,5,3,10,8,8,8,10,3,5,8,10,8,8,3,10,8,5,5,3,8,10,8,5,3,8,8,10,8,8,3,5,8,10,8,5,8,10,10,5,3,8,10,8,8,10,5,8,10,8,8,3,5,8,3,10,5,3,5,8,10,8,8,10,3,8,3,8,10,8,5,3,8,8,10,8,8,3,5,8,8,8,5,3,5,8,10,8,3,3];

function weightedRandom(){
  const total=WEIGHTS.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<WEIGHTS.length;i++){r-=WEIGHTS[i];if(r<=0)return LOTS[i];}
  return LOTS[0];
}

function drawLot(){
  const home=document.getElementById('home');
  home.classList.add('hiding');
  setTimeout(()=>{
    home.style.display='none';
    const lot=weightedRandom();
    renderResult(lot);
  },400);
}

function renderResult(lot){
  const numStr=lot.num.replace('第','').replace('番','');
  document.getElementById('lot-img').src='images/'+numStr+'.jpg';
  document.getElementById('lot-img').alt=lot.num+' '+lot.rank;
  document.getElementById('lot-num').textContent=lot.num;
  document.getElementById('lot-rank').textContent=lot.rank;
  document.getElementById('lot-rank').style.color=lot.rankColor;
  document.getElementById('lot-verse').textContent=lot.verse;
  document.getElementById('lot-reading').textContent=lot.reading;
  const grid=document.getElementById('lot-items');
  grid.innerHTML=lot.items.map(([k,v])=>`<div class="item-card"><p class="item-label" style="color:${lot.rankColor}">${k}</p><p class="item-text">${v}</p></div>`).join('');
  const result=document.getElementById('result');
  result.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>result.classList.add('visible')));
}

function resetLot(){
  const result=document.getElementById('result');
  result.classList.remove('visible');
  setTimeout(()=>{
    result.style.display='none';
    result.innerHTML=`<img class="lot-img" id="lot-img" src="" alt=""><p class="lot-num" id="lot-num"></p><p class="lot-rank" id="lot-rank"></p><div class="divider"></div><p class="lot-verse" id="lot-verse"></p><p class="section-label">籤解</p><p class="lot-reading" id="lot-reading"></p><div class="items-grid" id="lot-items"></div><button class="again-btn" onclick="resetLot()">再求一籤</button>`;
    const home=document.getElementById('home');
    home.style.display='flex';
    home.classList.remove('hiding');
  },400);
}
</script>
